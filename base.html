<!DOCTYPE html>
<html>
<head>
    <title>OCRAPS</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .sidebar {
            width: 220px;
            background: #0d1b2a;
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            color: white;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        .content {
            margin-left: 240px;
            padding: 40px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
        }

        th {
            background-color: #333;
            color: white;
        }

        button {
            padding: 8px 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>OCRAPS</h2>
    <a href="/">Dashboard</a>
    <a href="/view_crime">View Crime</a>
    <a href="/crime_analysis">Crime Analysis</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>
