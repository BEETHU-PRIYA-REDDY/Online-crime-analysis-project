<!DOCTYPE html>
<html>
<head>
    <title>Crime Analysis</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* Project Title */
        .header {
            background: #001f3f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #001f3f;
            position: fixed;
            top: 60px;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #0074D9;
        }

        /* Main content */
        .main {
            margin-left: 220px;
            margin-top: 60px;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #0074D9;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        .search-box {
            margin-top: 20px;
        }

        .search-box input {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background: #0074D9;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

    </style>

    <script>
        function searchTable() {
            let input = document.getElementById("searchInput");
            let filter = input.value.toLowerCase();
            let table = document.getElementById("crimeTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    if (txtValue.toLowerCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }
    </script>

</head>
<body>

<!-- Project Title -->
<div class="header">
    ONLINE CRIME ANALYSIS AND PREDICTION SYSTEM
</div>

<!-- Sidebar -->
<div class="sidebar">
    <a href="/addcrime">Add Crime</a>
    <a href="/viewcrime">View Crime</a>
    <a href="/crimeanalysis">Crime Analysis</a>
    <a href="/chart">Crime Chart</a>
    <a href="/prediction">Crime Prediction</a>
    <a href="/logout">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <div class="top-bar">
        <h2>Crime Analysis Report</h2>
        <a href="/dashboard" class="back-btn">Back</a>
    </div>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search Crime Type...">
    </div>

    <table id="crimeTable">
        <tr>
            <th>Crime Type</th>
            <th>Number of Cases</th>
            <th>Last Occurred</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
