<!DOCTYPE html>
<html>
<head>
    <title>View Crime</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
        }

        /* ===== Header ===== */
        .header {
            background-color: #001f3f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            width: 220px;
            height: 100%;
            background-color: #001f3f;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #0074D9;
        }

        /* ===== Main Content ===== */
        .main {
            margin-left: 220px;
            margin-top: 60px;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background-color: #0074D9;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background-color: #005fa3;
        }

        /* ===== Search Box ===== */
        .search-box {
            margin: 20px 0;
        }

        .search-box input {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* ===== Table ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background-color: #0074D9;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        th, td {
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

    </style>

    <script>
        function searchCrime() {
            let input = document.getElementById("searchInput");
            let filter = input.value.toLowerCase();
            let table = document.getElementById("crimeTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td");
                let found = false;

                for (let j = 0; j < td.length; j++) {
                    if (td[j]) {
                        let text = td[j].textContent || td[j].innerText;
                        if (text.toLowerCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }

                tr[i].style.display = found ? "" : "none";
            }
        }
    </script>

</head>
<body>

<!-- ===== Project Title ===== -->
<div class="header">
    ONLINE CRIME ANALYSIS AND PREDICTION SYSTEM
</div>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <a href="/addcrime">Add Crime</a>
    <a href="/viewcrime">View Crime</a>
    <a href="/crimeanalysis">Crime Analysis</a>
    <a href="/chart">Crime Chart</a>
    <a href="/prediction">Crime Prediction</a>
    <a href="/logout">Logout</a>
</div>

<!-- ===== Main Content ===== -->
<div class="main">

    <div class="top-bar">
        <h2>View Crime Records</h2>
        <a href="/dashboard" class="back-btn">Back</a>
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="searchCrime()" placeholder="Search any field...">
    </div>

    <!-- Crime Table -->
    <table id="crimeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Crime Type</th>
                <th>Location</th>
                <th>Date</th>
                <th>Description</th>
            </tr>
        </thead>

        <tbody>
            {% for crime in crimes %}
            <tr>
                <td>{{ crime[0] }}</td>
                <td>{{ crime[1] }}</td>
                <td>{{ crime[2] }}</td>
                <td>{{ crime[3] }}</td>
                <td>{{ crime[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
