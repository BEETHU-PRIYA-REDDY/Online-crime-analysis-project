<!DOCTYPE html>
<html>
<head>
    <title>Crime Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #001f3f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .sidebar {
            position: fixed;
            top: 60px;
            width: 220px;
            height: 100%;
            background: #001f3f;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #0074D9;
        }

        .main {
            margin-left: 220px;
            margin-top: 60px;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #0074D9;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        select {
            padding: 8px;
            margin: 10px;
        }

        canvas {
            margin-top: 30px;
            background: white;
            padding: 20px;
        }

    </style>
</head>

<body>

<div class="header">
    ONLINE CRIME ANALYSIS AND PREDICTION SYSTEM
</div>

<div class="sidebar">
    <a href="/addcrime">Add Crime</a>
    <a href="/viewcrime">View Crime</a>
    <a href="/crimeanalysis">Crime Analysis</a>
    <a href="/chart">Crime Chart</a>
    <a href="/prediction">Crime Prediction</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

    <div class="top-bar">
        <h2>Crime Chart Analysis</h2>
        <a href="/dashboard" class="back-btn">Back</a>
    </div>

    <div>
        <label><b>Select Chart Type:</b></label>
        <select id="chartType">
            <option value="bar">Bar Chart</option>
            <option value="pie">Pie Chart</option>
        </select>

        <label><b>Select Data Type:</b></label>
        <select id="dataType">
            <option value="crime">Crime Type</option>
            <option value="monthly">Monthly</option>
        </select>

        <button onclick="loadChart()">Generate Chart</button>
    </div>

    <canvas id="crimeChart"></canvas>

</div>

<script>
    let chart;

    const crimeLabels = {{ crime_type_labels | tojson }};
    const crimeValues = {{ crime_type_values | tojson }};
    const monthlyLabels = {{ monthly_labels | tojson }};
    const monthlyValues = {{ monthly_values | tojson }};

    function loadChart() {

        const type = document.getElementById("chartType").value;
        const dataType = document.getElementById("dataType").value;

        let labels, values;

        if (dataType === "crime") {
            labels = crimeLabels;
            values = crimeValues;
        } else {
            labels = monthlyLabels;
            values = monthlyValues;
        }

        if (chart) {
            chart.destroy();
        }

        const ctx = document.getElementById("crimeChart").getContext("2d");

        chart = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: "Number of Crimes",
                    data: values,
                    backgroundColor: [
                        '#0074D9','#FF4136','#2ECC40',
                        '#FF851B','#B10DC9','#FFDC00'
                    ]
                }]
            }
        });
    }
</script>

</body>
</html>
